<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>RemoteController</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
</head>
<body>
    <div id="loading-screen" style="position:fixed;inset:0;z-index:9999;background:#1a1b26;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s">
        <img src="/logo.png" alt="ThinkerChat" style="width:220px;max-width:60%">
        <div style="color:#565f89;font-size:.9rem;letter-spacing:1px">Connecting...</div>
        <div style="width:120px;height:3px;background:#292e42;border-radius:2px;overflow:hidden"><div style="width:0%;height:100%;background:#7aa2f7;border-radius:2px;animation:loadbar 2.5s ease forwards"></div></div>
    </div>
    <style>@keyframes loadbar{0%{width:0}40%{width:60%}80%{width:90%}100%{width:100%}}</style>
    <header>
        <div class="status-dot offline" id="status-dot" title="Agent Offline"></div>
        <nav>
            <button data-tab="terminal" class="active">Terminal</button>
            <button data-tab="files">Files</button>
            <button data-tab="dashboard">System</button>
            <button data-tab="screen" class="desktop-only">Screen</button>
        </nav>
        <span id="username-display" class="username-display"></span>
        <button id="settings-btn" title="Settings">&#9881;</button>
        <button id="logout-btn">Logout</button>
    </header>

    <!-- Settings Modal -->
    <div id="settings-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="modal-close" id="settings-close">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Account Info -->
                <div class="settings-section">
                    <h3>Account</h3>
                    <div class="info-row" style="font-size:0.88rem">
                        <span class="info-label">Logged in as</span>
                        <span class="info-value" id="settings-username">—</span>
                    </div>
                </div>

                <!-- Change Password -->
                <div class="settings-section">
                    <h3>Change Password</h3>
                    <form id="pw-form">
                        <div class="settings-field">
                            <label>Current Password</label>
                            <input type="password" id="pw-old" autocomplete="current-password">
                        </div>
                        <div class="settings-field">
                            <label>New Password</label>
                            <input type="password" id="pw-new" autocomplete="new-password">
                        </div>
                        <div class="settings-field">
                            <label>Confirm New Password</label>
                            <input type="password" id="pw-confirm" autocomplete="new-password">
                        </div>
                        <button type="submit" class="settings-btn">Change Password</button>
                        <div class="settings-msg" id="pw-msg"></div>
                    </form>
                </div>

                <!-- Two-Factor Authentication -->
                <div class="settings-section">
                    <h3>Two-Factor Authentication</h3>
                    <div id="tfa-status-area">
                        <p id="tfa-status-text" style="color:var(--text-muted);font-size:0.85rem;margin-bottom:12px">Loading...</p>
                        <button id="tfa-toggle-btn" class="settings-btn" style="display:none">Enable 2FA</button>
                    </div>
                    <!-- 2FA Setup Flow -->
                    <div id="tfa-setup-area" class="hidden">
                        <p style="color:var(--text-muted);font-size:0.82rem;margin-bottom:12px">
                            Scan this QR code with Google Authenticator, Authy, or any TOTP app:
                        </p>
                        <div id="tfa-qr" style="text-align:center;margin-bottom:12px;background:white;border-radius:8px;padding:12px;display:inline-block"></div>
                        <div style="margin-bottom:12px">
                            <label style="font-size:0.75rem;color:var(--text-muted)">Or enter this key manually:</label>
                            <input type="text" id="tfa-secret" readonly style="font-family:monospace;font-size:0.85rem;letter-spacing:2px;text-align:center;cursor:text">
                        </div>
                        <div class="settings-field">
                            <label>Enter the 6-digit code to verify:</label>
                            <input type="text" id="tfa-verify-code" maxlength="6" inputmode="numeric"
                                   pattern="[0-9]*" style="text-align:center;font-size:1.2rem;letter-spacing:6px">
                        </div>
                        <button id="tfa-verify-btn" class="settings-btn">Verify & Enable</button>
                        <button id="tfa-cancel-btn" class="settings-btn" style="background:transparent;color:var(--text-muted);border:1px solid var(--border)">Cancel</button>
                        <div class="settings-msg" id="tfa-msg"></div>
                    </div>
                    <!-- 2FA Disable Flow -->
                    <div id="tfa-disable-area" class="hidden">
                        <div class="settings-field">
                            <label>Enter your password to disable 2FA:</label>
                            <input type="password" id="tfa-disable-pw">
                        </div>
                        <button id="tfa-disable-confirm-btn" class="settings-btn" style="background:var(--danger)">Disable 2FA</button>
                        <button id="tfa-disable-cancel-btn" class="settings-btn" style="background:transparent;color:var(--text-muted);border:1px solid var(--border)">Cancel</button>
                        <div class="settings-msg" id="tfa-disable-msg"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <main>
        <section id="tab-terminal" class="tab-content active">
            <div id="terminal-header">
                <div id="terminal-tab-list"></div>
                <button id="terminal-add-btn" title="New Terminal">+</button>
            </div>
            <div id="terminal-panels"></div>
            <div id="mobile-keyboard-bar">
                <button data-key="\x1b">ESC</button>
                <button data-key="\t">TAB</button>
                <button data-key="\x03">^C</button>
                <button data-key="\x04">^D</button>
                <button data-key="\x1a">^Z</button>
                <button data-key="\x1b[A">&#9650;</button>
                <button data-key="\x1b[B">&#9660;</button>
                <button data-key="\x1b[D">&#9664;</button>
                <button data-key="\x1b[C">&#9654;</button>
                <button data-key="|">|</button>
                <button data-key="/">/</button>
                <button data-key="-">-</button>
            </div>
        </section>

        <section id="tab-files" class="tab-content">
            <div class="file-toolbar">
                <button id="file-up-btn" title="Go up">&#8593;</button>
                <input type="text" class="file-path" id="file-path" value="/" spellcheck="false" autocomplete="off">
                <button id="go-btn">Go</button>
            </div>
            <div class="file-list" id="file-list"></div>
            <div class="upload-area">
                <div class="upload-drop" id="upload-drop">
                    Drop files here or <label for="file-input">browse</label>
                    <input type="file" id="file-input" multiple>
                </div>
            </div>
        </section>

        <section id="tab-dashboard" class="tab-content">
            <div class="dashboard-grid" id="dashboard-grid"></div>
        </section>

        <section id="tab-screen" class="tab-content desktop-only">
            <div class="screen-controls">
                <div class="screen-settings">
                    <label>FPS: <span id="screen-fps-value">30</span>
                        <input type="range" id="screen-fps" min="5" max="60" value="30">
                    </label>
                    <label>Quality: <span id="screen-quality-value">50</span>
                        <input type="range" id="screen-quality" min="10" max="95" value="50">
                    </label>
                    <button id="screen-start-btn">Start</button>
                    <span id="screen-status" class="screen-status">Ready</span>
                </div>
            </div>
            <div class="screen-viewport">
                <canvas id="screen-canvas"></canvas>
            </div>
        </section>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ws.js"></script>
    <script src="/js/terminal.js"></script>
    <script src="/js/files.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/screen.js"></script>
    <script src="/js/settings.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
