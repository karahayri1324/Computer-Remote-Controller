<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>RemoteController</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
</head>
<body>
    <div id="loading-screen" style="position:fixed;inset:0;z-index:9999;background:#1a1b26;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s">
        <img src="/logo.png" alt="ThinkerChat" style="width:220px;max-width:60%">
        <div style="color:#565f89;font-size:.9rem;letter-spacing:1px">Connecting...</div>
        <div style="width:120px;height:3px;background:#292e42;border-radius:2px;overflow:hidden"><div style="width:0%;height:100%;background:#7aa2f7;border-radius:2px;animation:loadbar 2.5s ease forwards"></div></div>
    </div>
    <style>@keyframes loadbar{0%{width:0}40%{width:60%}80%{width:90%}100%{width:100%}}</style>
    <header>
        <div class="status-dot offline" id="status-dot" title="Agent Offline"></div>
        <nav>
            <button data-tab="terminal" class="active">Terminal</button>
            <button data-tab="files">Files</button>
            <button data-tab="dashboard">System</button>
            <button data-tab="screen" class="desktop-only">Screen</button>
        </nav>
        <button id="logout-btn">Logout</button>
    </header>

    <main>
        <section id="tab-terminal" class="tab-content active">
            <div id="terminal-header">
                <div id="terminal-tab-list"></div>
                <button id="terminal-add-btn" title="New Terminal">+</button>
            </div>
            <div id="terminal-panels"></div>
            <div id="mobile-keyboard-bar">
                <button data-key="\x1b">ESC</button>
                <button data-key="\t">TAB</button>
                <button data-key="\x03">^C</button>
                <button data-key="\x04">^D</button>
                <button data-key="\x1a">^Z</button>
                <button data-key="\x1b[A">&#9650;</button>
                <button data-key="\x1b[B">&#9660;</button>
                <button data-key="\x1b[D">&#9664;</button>
                <button data-key="\x1b[C">&#9654;</button>
                <button data-key="|">|</button>
                <button data-key="/">/</button>
                <button data-key="-">-</button>
            </div>
        </section>

        <section id="tab-files" class="tab-content">
            <div class="file-toolbar">
                <span class="file-path" id="file-path">/</span>
                <button id="go-btn">Go</button>
            </div>
            <div class="file-list" id="file-list"></div>
            <div class="upload-area">
                <div class="upload-drop" id="upload-drop">
                    Drop files here or <label for="file-input">browse</label>
                    <input type="file" id="file-input" multiple>
                </div>
            </div>
        </section>

        <section id="tab-dashboard" class="tab-content">
            <div class="dashboard-grid" id="dashboard-grid"></div>
        </section>

        <section id="tab-screen" class="tab-content desktop-only">
            <div class="screen-controls">
                <div class="screen-settings">
                    <label>FPS: <span id="screen-fps-value">30</span>
                        <input type="range" id="screen-fps" min="5" max="60" value="30">
                    </label>
                    <label>Quality: <span id="screen-quality-value">50</span>
                        <input type="range" id="screen-quality" min="10" max="95" value="50">
                    </label>
                    <button id="screen-start-btn">Start</button>
                    <span id="screen-status" class="screen-status">Ready</span>
                </div>
            </div>
            <div class="screen-viewport">
                <canvas id="screen-canvas"></canvas>
            </div>
        </section>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ws.js"></script>
    <script src="/js/terminal.js"></script>
    <script src="/js/files.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/screen.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
