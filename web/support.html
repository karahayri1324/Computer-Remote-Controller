<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemoteController - Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1b26;
            color: #a9b1d6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #24283b;
            border-radius: 12px;
            padding: 40px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            text-align: center;
        }
        h1 {
            color: #7aa2f7;
            font-size: 1.5rem;
            margin-bottom: 12px;
        }
        p {
            color: #565f89;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .contact {
            background: #1a1b26;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .contact-label {
            font-size: 0.75rem;
            color: #565f89;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .contact-value {
            color: #c0caf5;
            font-size: 1rem;
        }
        a {
            color: #7aa2f7;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
        .back {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border: 1px solid #3b4261;
            border-radius: 8px;
            color: #7aa2f7;
            font-size: 0.9rem;
        }
        .back:hover { border-color: #7aa2f7; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Support</h1>
        <p>Need help with RemoteController? Reach out to us through the channels below.</p>

        <div class="contact">
            <div class="contact-label">Email</div>
            <div class="contact-value"><a href="mailto:support@thinkerchat.com">support@thinkerchat.com</a></div>
        </div>

        <div class="contact">
            <div class="contact-label">Website</div>
            <div class="contact-value"><a href="https://thinkerchat.com">thinkerchat.com</a></div>
        </div>

        <a href="/index.html" class="back">&larr; Back to Login</a>
    </div>
</body>
</html>
