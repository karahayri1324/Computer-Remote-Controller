<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RemoteController - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1b26;
            color: #a9b1d6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .login-card {
            background: #24283b;
            border-radius: 12px;
            padding: 40px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        h1 {
            color: #7aa2f7;
            font-size: 1.5rem;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #565f89;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #7982a9;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            background: #1a1b26;
            border: 1px solid #3b4261;
            border-radius: 8px;
            color: #c0caf5;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #7aa2f7; }
        button {
            width: 100%;
            padding: 12px;
            background: #7aa2f7;
            color: #1a1b26;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 4px;
        }
        button:hover { background: #89b4fa; }
        button:disabled { background: #3b4261; cursor: not-allowed; }
        .error {
            color: #f7768e;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }
        .tabs { display: flex; margin-bottom: 24px; border-radius: 8px; overflow: hidden; }
        .tabs button {
            flex: 1; padding: 10px; background: #1a1b26; color: #565f89;
            border: 1px solid #3b4261; font-size: 0.85rem; margin: 0; border-radius: 0;
        }
        .tabs button.active { background: #7aa2f7; color: #1a1b26; border-color: #7aa2f7; }
        .tabs button:first-child { border-radius: 8px 0 0 8px; }
        .tabs button:last-child { border-radius: 0 8px 8px 0; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>RemoteController</h1>
        <p class="subtitle">Access your PC from anywhere</p>

        <div class="tabs">
            <button id="tab-login" class="active" onclick="showTab('login')">Login</button>
            <button id="tab-register" onclick="showTab('register')">Register</button>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="login-user">Username</label>
                <input type="text" id="login-user" autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label for="login-pass">Password</label>
                <input type="password" id="login-pass" autocomplete="current-password">
            </div>
            <button type="submit" id="login-btn">Login</button>
        </form>

        <form id="register-form" style="display:none">
            <div class="form-group">
                <label for="reg-user">Username</label>
                <input type="text" id="reg-user" autocomplete="username" placeholder="min 3 chars, alphanumeric">
            </div>
            <div class="form-group">
                <label for="reg-pass">Password</label>
                <input type="password" id="reg-pass" autocomplete="new-password" placeholder="min 4 chars">
            </div>
            <button type="submit" id="reg-btn">Register</button>
        </form>

        <p class="error" id="error-msg"></p>
        <p class="error" id="success-msg" style="color:#9ece6a"></p>
    </div>

    <script>
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        function showTab(tab) {
            errorMsg.textContent = '';
            successMsg.textContent = '';
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        }

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.textContent = '';
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('login-user').value,
                        password: document.getElementById('login-pass').value,
                    })
                });
                const data = await resp.json();
                if (!resp.ok) { errorMsg.textContent = data.error || 'Login failed'; return; }
                sessionStorage.setItem('access_token', data.access_token);
                sessionStorage.setItem('username', data.username);
                window.location.href = '/app.html';
            } catch (err) {
                errorMsg.textContent = 'Connection error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });

        // Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.textContent = '';
            successMsg.textContent = '';
            const btn = document.getElementById('reg-btn');
            btn.disabled = true;
            btn.textContent = 'Registering...';
            try {
                const resp = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('reg-user').value,
                        password: document.getElementById('reg-pass').value,
                    })
                });
                const data = await resp.json();
                if (!resp.ok) { errorMsg.textContent = data.error || 'Registration failed'; return; }
                successMsg.textContent = 'Account created! You can now login.';
                setTimeout(() => showTab('login'), 1500);
            } catch (err) {
                errorMsg.textContent = 'Connection error';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Register';
            }
        });

        if (sessionStorage.getItem('access_token')) {
            window.location.href = '/app.html';
        }
    </script>
</body>
</html>
