<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RemoteController</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1b26;
            color: #a9b1d6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .login-card {
            background: #24283b;
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            border: 1px solid #3b4261;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #7aa2f7, #bb9af7);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            font-size: 28px;
        }
        h1 {
            color: #c0caf5;
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .subtitle {
            color: #565f89;
            font-size: 0.82rem;
        }
        .form-group { margin-bottom: 14px; }
        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #7982a9;
            letter-spacing: 0.3px;
        }
        input {
            width: 100%;
            padding: 11px 14px;
            background: #1a1b26;
            border: 1px solid #3b4261;
            border-radius: 8px;
            color: #c0caf5;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: #7aa2f7;
            box-shadow: 0 0 0 3px rgba(122, 162, 247, 0.12);
        }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #7aa2f7;
            color: #1a1b26;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }
        button[type="submit"]:hover { background: #89b4fa; }
        button[type="submit"]:active { transform: scale(0.98); }
        button[type="submit"]:disabled { background: #3b4261; color: #565f89; cursor: not-allowed; transform: none; }
        .error {
            color: #f7768e;
            font-size: 0.82rem;
            text-align: center;
            margin-top: 14px;
            min-height: 18px;
            font-weight: 500;
        }
        .pw-toggle {
            position: relative;
        }
        .pw-toggle input {
            padding-right: 42px;
        }
        .pw-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #565f89;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            width: auto;
            margin: 0;
        }
        .pw-eye:hover { color: #a9b1d6; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-icon">&#128187;</div>
            <h1>RemoteController</h1>
            <p class="subtitle">Access your PC from anywhere</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="login-user">Username</label>
                <input type="text" id="login-user" autocomplete="username" autofocus spellcheck="false">
            </div>
            <div class="form-group">
                <label for="login-pass">Password</label>
                <div class="pw-toggle">
                    <input type="password" id="login-pass" autocomplete="current-password">
                    <button type="button" class="pw-eye" id="pw-eye-btn" tabindex="-1">&#128065;</button>
                </div>
            </div>
            <button type="submit" id="login-btn">Login</button>
        </form>

        <p class="error" id="error-msg"></p>
    </div>

    <script>
        const errorMsg = document.getElementById('error-msg');
        const loginBtn = document.getElementById('login-btn');

        // Show/hide password
        document.getElementById('pw-eye-btn').addEventListener('click', () => {
            const input = document.getElementById('login-pass');
            const btn = document.getElementById('pw-eye-btn');
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '&#128683;';
            } else {
                input.type = 'password';
                btn.innerHTML = '&#128065;';
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.textContent = '';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('login-user').value.trim(),
                        password: document.getElementById('login-pass').value,
                    })
                });
                const data = await resp.json();
                if (!resp.ok) {
                    errorMsg.textContent = data.error || 'Login failed';
                    return;
                }
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('rc_username', data.username);
                window.location.href = '/app.html';
            } catch {
                errorMsg.textContent = 'Connection error — check your network';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        if (localStorage.getItem('access_token')) {
            window.location.href = '/app.html';
        }
    </script>
</body>
</html>
